<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>A Cute Surprise</title>
<style>
body{margin:0;font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;background:linear-gradient(135deg,#ff9ecb,#ffd6e8);}
body:before{content:"❤️ ❤️ 🌹 ❤️ 🌹 ❤️";position:absolute;inset:0;font-size:40px;opacity:.15;display:flex;justify-content:center;align-items:center;animation:f 10s linear infinite}
@keyframes f{from{transform:translateY(-20px)}to{transform:translateY(20px)}}
.card{position:relative;background:rgba(255,255,255,.2);backdrop-filter:blur(8px);padding:30px;border-radius:20px;text-align:center;max-width:500px;box-shadow:0 8px 30px rgba(0,0,0,.2)}
h1{color:#d81b60}button{padding:14px 28px;border:none;border-radius:999px;background:#ff4d88;color:#fff;font-size:18px;cursor:pointer}
#player{display:none;width:100vw;height:100vh;background:#000;position:fixed;inset:0}
video{width:100%;height:100%;object-fit:contain}
</style></head>
<body>
<div class="card" id="card">
<h1>A Cute Surprise For You 💕</h1>
<h2>My Princess 👑</h2>
<p>A little surprise made with lots of love ❤️</p>
<p><b>— Arya</b></p>
<button onclick="openVideo()">🎁 Open Your Surprise</button>
</div>
<div id="player">
<video id="vid" controls>
<source src="1000029725.mp4" type="video/mp4">
</video>
</div>
<script>
function openVideo(){
document.getElementById('card').style.display='none';
document.getElementById('player').style.display='block';
let v=document.getElementById('vid');
v.play();
}
</script>
</body></html>
